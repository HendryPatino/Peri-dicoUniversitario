<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Social | Conectarse</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .login-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
        }
        .login-box {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary);
            border-left: 1px solid var(--gray);
            border-right: 1px solid var(--gray);
            border-bottom: 1px solid var(--gray);
        }
        .login-box h2 {
            margin-bottom: 0.5rem;
            color: var(--primary);
            text-align: center;
            font-weight: 800;
        }
        .login-subtitle {
            text-align: center;
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            font-size: 0.95rem;
        }
        .error-alert {
            background-color: #fff5f5;
            color: var(--color-global);
            padding: 0.7rem;
            border-radius: 4px;
            border-left: 4px solid var(--color-global);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none; /* JS lo enciende si fallas */
            text-align: center;
            font-weight: 600;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body class="login-layout">

    <div class="login-box">
        <h2>U-Social</h2>
        <p class="login-subtitle">Ingresa tus credenciales universitarias</p>
        
        <div id="error-box" class="error-alert">📧 Correo o contraseña incorrectos</div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Institucional</label>
                <input type="email" id="email" class="form-input" placeholder="ejemplo@u.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit" style="width: 100%; margin-top: 0.5rem;">Iniciar Sesión</button>
        </form>
        
        <a href="../index.html" class="back-link">← Volver al Periódico</a>
    </div>

    <!-- ENLACES A SCRIPTS MAESTROS CORREGIDOS -->
    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/custom.js"></script>
</body>
</html>
