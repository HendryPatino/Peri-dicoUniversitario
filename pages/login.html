<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Social | Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Mantenemos intactos tus estilos estructurales específicos para centrar la tarjeta de login */
        .login-wrapper {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }
        .login-box {
            max-width: 450px;
            width: 100%;
            background-color: var(--white);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid var(--gray);
            text-align: center;
        }
        .login-box h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .login-box p {
            color: #718096;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }
        .error-alert {
            background-color: #fff5f5;
            color: #c53030;
            padding: 0.75rem;
            border-radius: 4px;
            border: 1px solid #fed7d7;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            display: none; /* Controlado dinámicamente por auth.js */
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #4a5568;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body class="theme-dark font-comic">

    <main class="container login-wrapper">
        <div class="login-box" style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);">
            <h2>U-<span>Social</span></h2>
            <p>Ingresa tus credenciales institucionales unificadas para interactuar en la comunidad.</p>

            <div id="error-message" class="error-alert"></div>

            <form id="login-form" class="news-form">
                <div class="form-group" style="text-align: left; margin-bottom: 1rem;">
                    <label for="email" style="display: block; margin-bottom: 0.3rem; font-weight: 600;">Correo Institucional</label>
                    <input type="email" id="email" class="form-control" placeholder="ejemplo@u.com" required style="width: 100%; padding: 0.5rem; border-radius: 4px;">
                </div>
                
                <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <label for="password" style="display: block; margin-bottom: 0.3rem; font-weight: 600;">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="........" required style="width: 100%; padding: 0.5rem; border-radius: 4px;">
                </div>

                <button type="submit" class="btn-submit" style="width: 100%; padding: 0.8rem; font-size: 1rem; font-weight: bold; cursor: pointer;">Iniciar Sesión</button>
            </form>

            <a href="../index.html" class="back-link" style="color: inherit; opacity: 0.7;">← Volver al Periódico</a>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 U-Social - Portal de Acceso Seguro.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/custom.js"></script>
</body>
</html>
